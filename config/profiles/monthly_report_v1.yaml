  - 1-3 T0过件率_免费
  filter_exclude: .nan
  merge_rules: {}
  show_total_line: false
  unit_divisor: 1.0
  unit: .nan
  report_month: 2026-02
  analysis_template: quality_trend
  data_source_type: derived
