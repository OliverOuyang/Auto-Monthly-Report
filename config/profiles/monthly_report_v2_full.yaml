report_month: 2026-02
manual_inputs_csv: config/manual_inputs.csv

indicators:
  # ============================================================================
  # P7-10: 原有的4个指标
  # ============================================================================
  - indicator_id: trade_by_group
    slide_order: 7
    chart_type: stacked_bar_line
    chart_title: 首借交易额-24H
    slide_title: 获客规模指标：1-7评级首借交易 By客群
    raw_sheet: 1_首借交易
    time_column: month
    group_column: user_group
    value_column: loan_principal_amount
    agg_func: sum
    categories:
      - 当月首登M0
      - 存量首登M0
      - 初审M1+
      - 非初审
      - API回流
    filter_exclude:
      - 其他
    merge_rules:
      非初审-重申: 非初审
      非初审-重审及其他: 非初审
    show_total_line: true
    unit_divisor: 100000000.0
    unit: 亿
    analysis_template: trade_mom
    data_source_type: single

  - indicator_id: spend_by_channel
    slide_order: 8
    chart_type: stacked_bar_line
    chart_title: 业务口径花费-by渠道
    slide_title: 获客规模指标：花费 By渠道
    raw_sheet: 2_花费
    time_column: date_month
    group_column: 渠道类别
    value_column: 业务口径花费
    agg_func: sum
    categories:
      - 腾讯
      - 抖音
      - 精准营销
      - 付费商店
      - 其他信息流
      - 其他CPA渠道
      - MGM
    filter_exclude:
      - 其他
      - 免费渠道
    merge_rules: {}
    show_total_line: true
    unit_divisor: 10000.0
    unit: 万
    analysis_template: spend_mom
    data_source_type: single

  - indicator_id: cps_all_channel
    slide_order: 9
    chart_type: dual_line
    chart_title: CPS
    slide_title: 获客效率指标：1-7评级CPS
    raw_sheet: .nan
    categories:
      - 1-7全首借CPS
      - 1-7 T0CPS
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: cps_trend
    data_source_type: derived

  - indicator_id: quality_credit
    slide_order: 10
    chart_type: bar_multi_line
    chart_title: 1-3过件率 & 1-7平均授信额度
    slide_title: 获客质量指标：首登T0 1-3组过件率、1-7组平均授信额度
    raw_sheet: 3_首登到交易转化
    categories:
      - 1-7 T0平均授信额度
      - 1-3 T0过件率
      - 1-3 T0过件率_投放渠道
      - 1-3 T0过件率_免费
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: quality_trend
    data_source_type: derived

  # ============================================================================
  # P11, P15, P19: 三个渠道转化总览
  # ============================================================================
  - indicator_id: channel_overview_tencent
    slide_order: 11
    chart_type: dual_line_with_bar
    chart_title: 腾讯渠道转化总览
    slide_title: 渠道转化：腾讯渠道整体表现
    raw_sheet: 4_转化
    channel_filter: 腾讯
    categories:
      - 日耗
      - T0CPS_24h
      - 1-7平均额度
      - 进件1-3通过率
      - 进件1-7通过率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview
    data_source_type: derived
    use_llm_analysis: true

  - indicator_id: channel_overview_douyin
    slide_order: 15
    chart_type: dual_line_with_bar
    chart_title: 抖音渠道转化总览
    slide_title: 渠道转化：抖音渠道整体表现
    raw_sheet: 4_转化
    channel_filter: 抖音
    categories:
      - 日耗
      - T0CPS_24h
      - 1-7平均额度
      - 进件1-3通过率
      - 进件1-7通过率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview
    data_source_type: derived
    use_llm_analysis: true

  - indicator_id: channel_overview_jingzhun
    slide_order: 19
    chart_type: dual_line_with_bar
    chart_title: 精准营销渠道转化总览
    slide_title: 渠道转化：精准营销渠道整体表现
    raw_sheet: 4_转化
    channel_filter: 精准营销
    categories:
      - 日耗
      - T0CPS_24h
      - 1-7平均额度
      - 进件1-3通过率
      - 进件1-7通过率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview
    data_source_type: derived
    use_llm_analysis: true

  # ============================================================================
  # P12-14: 腾讯渠道详细分析
  # ============================================================================
  - indicator_id: tencent_request
    slide_order: 12
    chart_type: dual_line_with_bar
    chart_title: 腾讯-请求及参竞
    slide_title: 腾讯渠道详细分析：请求数与参竞数
    raw_sheet: 5_腾讯
    categories:
      - 请求数
      - 参竞数
      - 参竞率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: tencent_request
    data_source_type: derived
    use_llm_analysis: true
    # 策略调整节点标注 (需要在图表渲染时处理)
    strategy_annotations:
      - date: 2025-11-15
        label: 策略调整A

  - indicator_id: tencent_win_rate
    slide_order: 13
    chart_type: multi_line_grouped
    chart_title: 腾讯-竞得率
    slide_title: 腾讯渠道详细分析：竞得率(整体 & 分组)
    raw_sheet: 5_腾讯
    group_by: v7prea
    categories:
      - 整体竞得率
      - 1Q竞得率
      - 2Q竞得率
      - 3Q竞得率
      - 其他竞得率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: tencent_win_rate
    data_source_type: derived
    use_llm_analysis: true

  - indicator_id: tencent_conversion
    slide_order: 14
    chart_type: dual_line_with_bar
    chart_title: 腾讯-曝光至授信
    slide_title: 腾讯渠道详细分析：曝光至授信转化
    raw_sheet: 5_腾讯
    categories:
      - 曝光数
      - 点击数
      - 授信数
      - CTR
      - CVR
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: tencent_conversion
    data_source_type: derived
    use_llm_analysis: true

  # ============================================================================
  # P16-18: 抖音渠道详细分析
  # ============================================================================
  - indicator_id: douyin_request
    slide_order: 16
    chart_type: dual_line_with_bar
    chart_title: 抖音-请求及参竞
    slide_title: 抖音渠道详细分析：请求数与竞得数
    raw_sheet: 6_抖音
    categories:
      - 请求数
      - 竞得数
      - 竞得率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: douyin_request
    data_source_type: derived
    use_llm_analysis: true

  - indicator_id: douyin_win_rate
    slide_order: 17
    chart_type: multi_line_grouped
    chart_title: 抖音-竞得率
    slide_title: 抖音渠道详细分析：竞得率(整体 & 分组)
    raw_sheet: 6_抖音
    group_by: v8prea
    categories:
      - 整体竞得率
      - UNK竞得率
      - 1Q竞得率
      - 2Q竞得率
      - 其他竞得率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: douyin_win_rate
    data_source_type: derived
    use_llm_analysis: true

  - indicator_id: douyin_conversion
    slide_order: 18
    chart_type: dual_line_with_bar
    chart_title: 抖音-曝光至登录
    slide_title: 抖音渠道详细分析：曝光至登录转化
    raw_sheet: 6_抖音
    categories:
      - 曝光数
      - 点击数
      - 登录数
      - CTR
      - CVR
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: douyin_conversion
    data_source_type: derived
    use_llm_analysis: true

  # ============================================================================
  # P20-21: 精准渠道详细分析
  # ============================================================================
  - indicator_id: jingzhun_attack_result
    slide_order: 20
    chart_type: stacked_column_chart
    chart_title: 精准-授库结果
    slide_title: 精准营销渠道详细分析：授库结果
    raw_sheet: 7_精准
    categories:
      - 授库量
      - 可营销量
      - 可营销率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: jingzhun_attack
    data_source_type: derived
    use_llm_analysis: true

  - indicator_id: jingzhun_conversion
    slide_order: 21
    chart_type: dual_line
    chart_title: 精准-可营销转化
    slide_title: 精准营销渠道详细分析：可营销转化率
    raw_sheet: 7_精准
    categories:
      - 可营销量
      - 实际营销量
      - 转化率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: jingzhun_conversion
    data_source_type: derived
    use_llm_analysis: true

# ============================================================================
# 样式配置
# ============================================================================
