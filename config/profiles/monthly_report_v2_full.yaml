  colors:
    # 客群颜色
    当月首登M0: '#1F4E79'
    存量首登M0: '#ED7D31'
    初审M1+: '#FFC000'
    非初审: '#70AD47'
    API回流: '#5B9BD5'
    # 渠道颜色
    腾讯: '#1F4E79'
    抖音: '#ED7D31'
    精准营销: '#FFC000'
    付费商店: '#70AD47'
    其他信息流: '#9DC3E6'
    其他CPA渠道: '#FF8080'
    MGM: '#404040'
    # CPS指标颜色
    1-7全首借CPS: '#4472C4'
    1-7 T0CPS: '#ED7D31'
    # 质量指标颜色
    1-7 T0平均授信额度: '#FFC000'
    1-3 T0过件率: '#4472C4'
    1-3 T0过件率_投放渠道: '#ED7D31'
    1-3 T0过件率_免费: '#70AD47'
    # 新增：渠道转化指标颜色
    日耗: '#4472C4'
    T0CPS_24h: '#ED7D31'
    1-7平均额度: '#FFC000'
    进件1-3通过率: '#70AD47'
    进件1-7通过率: '#9DC3E6'
    # 新增：请求/竞得/转化指标颜色
    请求数: '#808080'
    参竞数: '#4472C4'
    竞得数: '#4472C4'
    参竞率: '#ED7D31'
    竞得率: '#ED7D31'
    整体竞得率: '#000000'
    1Q竞得率: '#4472C4'
    2Q竞得率: '#ED7D31'
    3Q竞得率: '#FFC000'
    UNK竞得率: '#808080'
    其他竞得率: '#70AD47'
    # 新增：曝光转化指标
    曝光数: '#808080'
    点击数: '#4472C4'
    登录数: '#ED7D31'
    授信数: '#FFC000'
    CTR: '#4472C4'
    CVR: '#ED7D31'
    # 新增：精准授库指标
    授库量: '#4472C4'
    可营销量: '#ED7D31'
    可营销率: '#808080'
    实际营销量: '#FFC000'
    转化率: '#70AD47'

  global:
    title_color: '#8B4513'
    total_line_color: '#FF0000'
    label_color: '#5A5A5A'
    font_family: Microsoft YaHei
