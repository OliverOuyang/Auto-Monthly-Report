report_month: 2026-02
manual_inputs_csv: config/manual_inputs.csv

indicators:
  # ============================================================================
  # P7-10: 原有的4个指标
  # ============================================================================
  - indicator_id: trade_by_group
    slide_order: 7
    chart_type: stacked_bar_line
    chart_title: 首借交易额-24H
    slide_title: 获客规模指标：1-7评级首借交易 By客群
    raw_sheet: 1_首借交易
    time_column: month
    group_column: user_group
    value_column: loan_principal_amount
    agg_func: sum
    categories:
      - 当月首登M0
      - 存量首登M0
      - 初审M1+
      - 非初审
      - API回流
    filter_exclude:
      - 其他
    merge_rules:
      非初审-重申: 非初审
      非初审-重审及其他: 非初审
    show_total_line: true
    unit_divisor: 100000000.0
    unit: 亿
    analysis_template: trade_mom
    data_source_type: single

  - indicator_id: spend_by_channel
    slide_order: 8
    chart_type: stacked_bar_line
    chart_title: 业务口径花费-by渠道
    slide_title: 获客规模指标：花费 By渠道
    raw_sheet: 2_花费
    time_column: date_month
    group_column: 渠道类别
    value_column: 业务口径花费
    agg_func: sum
    categories:
      - 腾讯
      - 抖音
      - 精准营销
      - 付费商店
      - 其他信息流
      - 其他CPA渠道
      - MGM
    filter_exclude:
      - 其他
      - 免费渠道
    merge_rules: {}
    show_total_line: true
    unit_divisor: 10000.0
    unit: 万
    analysis_template: spend_mom
    data_source_type: single

  - indicator_id: cps_all_channel
    slide_order: 9
    chart_type: dual_line
    chart_title: CPS
    slide_title: 获客效率指标：1-7评级CPS
    raw_sheet: .nan
    categories:
      - 1-7全首借CPS
      - 1-7 T0CPS
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: cps_trend
    data_source_type: derived

  - indicator_id: quality_credit
    slide_order: 10
    chart_type: bar_multi_line
    chart_title: 1-3过件率 & 1-7平均授信额度
    slide_title: 获客质量指标：首登T0 1-3组过件率、1-7组平均授信额度
    raw_sheet: 3_首登到交易转化
    categories:
      - 1-7 T0平均授信额度
      - 1-3 T0过件率
      - 1-3 T0过件率_投放渠道
      - 1-3 T0过件率_免费
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: quality_trend
    data_source_type: derived

  # ============================================================================
  # P11: 腾讯渠道转化总览 (分为左右两个子图)
  # ============================================================================
  - indicator_id: channel_overview_tencent_cost
    slide_order: 11
    chart_type: dual_line_with_bar
    chart_title: 花费及成本
    slide_title: 腾讯总览：质量成本达成良好;稳定质量,持续提升用户质量
    raw_sheet: 4_转化
    channel_filter: 腾讯
    categories:
      - 日耗
      - T0CPS_24h
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview
    data_source_type: derived
    is_left_chart: true  # 标记为左图

  - indicator_id: channel_overview_tencent_quality
    slide_order: 11
    chart_type: bar_multi_line
    chart_title: 质量表现
    slide_title: "腾讯总览：质量成本达成良好;稳定质量,持续提升用户质量"  # 与cost图使用相同标题
    raw_sheet: 4_转化
    channel_filter: 腾讯
    categories:
      - 1-7额度
      - 过件率1-3_排年龄
      - 过件率1-7_排年龄
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview  # 使用智能分析
    data_source_type: derived
    is_right_chart: true  # 标记为右图
    merge_with_prev: true  # 合并到上一个slide

  # ============================================================================
  # P15: 抖音渠道转化总览
  # ============================================================================
  - indicator_id: channel_overview_douyin_cost
    slide_order: 15
    chart_type: dual_line_with_bar
    chart_title: 抖音核心指标
    slide_title: 抖音总览：规模不足、指标波动较大;短期适当放开排除、提出价方式提升规模
    raw_sheet: 4_转化
    channel_filter: 抖音
    categories:
      - 日耗
      - T0CPS_24h
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview
    data_source_type: derived
    is_left_chart: true

  - indicator_id: channel_overview_douyin_quality
    slide_order: 15
    chart_type: bar_multi_line
    chart_title: 抖音质量表现
    slide_title: "抖音总览：规模不足、指标波动较大;短期适当放开排除、提出价方式提升规模"  # 与cost图使用相同标题
    raw_sheet: 4_转化
    channel_filter: 抖音
    categories:
      - 1-7额度
      - 过件率1-3_排年龄
      - 过件率1-7_排年龄
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview  # 使用智能分析
    data_source_type: derived
    is_right_chart: true
    merge_with_prev: true

  # ============================================================================
  # P19: 精准营销渠道转化总览
  # ============================================================================
  - indicator_id: channel_overview_jingzhun_cost
    slide_order: 19
    chart_type: dual_line_with_bar
    chart_title: 精准核心指标
    slide_title: 精准总览：质量提升显著,持续优化用户质量结构
    raw_sheet: 4_转化
    channel_filter: 精准营销
    categories:
      - 日耗
      - T0CPS_24h
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview
    data_source_type: derived
    is_left_chart: true

  - indicator_id: channel_overview_jingzhun_quality
    slide_order: 19
    chart_type: bar_multi_line
    chart_title: 精准质量表现
    slide_title: "精准总览：质量提升显著,持续优化用户质量结构"  # 与cost图使用相同标题
    raw_sheet: 4_转化
    channel_filter: 精准营销
    categories:
      - 1-7额度
      - 过件率1-3_排年龄
      - 过件率1-7_排年龄
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: channel_overview  # 使用智能分析
    data_source_type: derived
    is_right_chart: true
    merge_with_prev: true

  # ============================================================================
  # P12-14: 腾讯渠道详细分析
  # ============================================================================
  - indicator_id: tencent_request
    slide_order: 12
    chart_type: dual_line_with_bar
    chart_title: 腾讯-请求及参竞
    slide_title: 腾讯转化—请求及参竞
    raw_sheet: 5_腾讯
    categories:
      - 日请求量
      - 参竞率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    # 策略调整节点标注
    strategy_annotations:
      - date: 2026-01-09
        label: RTAV9排除增加10%

  # P13需要左右两图:整体竞得率(左) + 分组竞得率(右)
  - indicator_id: tencent_win_rate_overall
    slide_order: 13
    chart_type: single_line
    chart_title: 腾讯竞得率
    slide_title: 腾讯转化—竞得率
    raw_sheet: 5_腾讯
    categories:
      - 整体竞得率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    is_left_chart: true

  - indicator_id: tencent_win_rate_grouped
    slide_order: 13
    chart_type: multi_line_grouped
    chart_title: 腾讯竞得率byV7preA
    slide_title: ""
    raw_sheet: 5_腾讯
    categories:
      - 1Q竞得率
      - 2Q竞得率
      - 3Q竞得率
      - UNK竞得率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    is_right_chart: true
    merge_with_prev: true
    strategy_annotations:
      - date: 2026-01-09
        label: RTAV9出价优化

  # P14需要左右两图:曝光-授信率(左) + CTR/CVR(右)
  - indicator_id: tencent_conversion_overall
    slide_order: 14
    chart_type: single_line
    chart_title: 曝光-授信率x1000
    slide_title: 腾讯转化—曝光至授信
    raw_sheet: 5_腾讯
    categories:
      - 曝光-授信
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    is_left_chart: true

  - indicator_id: tencent_conversion_funnel
    slide_order: 14
    chart_type: dual_line
    chart_title: 分环节转化
    slide_title: ""
    raw_sheet: 5_腾讯
    categories:
      - CTR
      - CVR
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    is_right_chart: true
    merge_with_prev: true

  # ============================================================================
  # P16-18: 抖音渠道详细分析
  # ============================================================================
  - indicator_id: douyin_request
    slide_order: 16
    chart_type: dual_line_with_bar
    chart_title: 抖音-请求及参竞
    slide_title: 抖音转化—请求及参竞
    raw_sheet: 6_抖音
    categories:
      - 日请求量
      - 参竞率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    strategy_annotations:
      - date: 2025-12-15
        label: 1125 RTAV8迭代 多排除7%交易

  # P17需要左右两图:竞得率整体(左) + 分组byV8preA(右)
  - indicator_id: douyin_win_rate_overall
    slide_order: 17
    chart_type: single_line
    chart_title: 抖音竞得率
    slide_title: 抖音转化—竞得率
    raw_sheet: 6_抖音
    categories:
      - 整体竞得率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    is_left_chart: true

  - indicator_id: douyin_win_rate_grouped
    slide_order: 17
    chart_type: multi_line_grouped
    chart_title: 抖音竞得率byV8preA
    slide_title: ""
    raw_sheet: 6_抖音
    categories:
      - 1Q竞得率
      - 2Q竞得率
      - 3Q竞得率
      - UNK竞得率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    is_right_chart: true
    merge_with_prev: true

  # P18需要左右两图:曝光-授信率*1000(左) + CTR/CVR(右)
  - indicator_id: douyin_conversion_overall
    slide_order: 18
    chart_type: single_line
    chart_title: 曝光授信率*1000
    slide_title: 抖音转化—曝光至授信
    raw_sheet: 6_抖音
    categories:
      - 曝光-授信
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    is_left_chart: true

  - indicator_id: douyin_conversion_funnel
    slide_order: 18
    chart_type: dual_line
    chart_title: 分环节转化
    slide_title: ""
    raw_sheet: 6_抖音
    categories:
      - CTR
      - CVR
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    is_right_chart: true
    merge_with_prev: true

  # ============================================================================
  # P20-21: 精准渠道详细分析
  # ============================================================================
  - indicator_id: jingzhun_attack_result
    slide_order: 20
    chart_type: stacked_column_chart
    chart_title: 精准撞库结果
    slide_title: 精准转化-撞库至可营销
    raw_sheet: 7_精准
    categories:
      - 日均撞库量（亿）
      - 日均可营销量（亿）
      - 可营销率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    use_llm_analysis: true

  - indicator_id: jingzhun_conversion_overall
    slide_order: 21
    chart_type: single_line
    chart_title: 可营销-授信率
    slide_title: 精准转化-可营销至授信
    raw_sheet: 7_精准
    categories:
      - 千次可营销-授信率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    use_llm_analysis: true
    is_left_chart: true

  - indicator_id: jingzhun_conversion_funnel
    slide_order: 21
    chart_type: dual_line
    chart_title: 分环节转化
    slide_title: ""
    raw_sheet: 7_精准
    categories:
      - 千次可营销-首登率
      - 首登-授信率
    show_total_line: false
    unit_divisor: 1.0
    analysis_template: generic_trend
    data_source_type: derived
    use_llm_analysis: true
    is_right_chart: true
    merge_with_prev: true

# ============================================================================
# 样式配置
# ============================================================================
styles:
  colors:
    # 客群颜色
    当月首登M0: '#1F4E79'
    存量首登M0: '#ED7D31'
    初审M1+: '#FFC000'
    非初审: '#70AD47'
    API回流: '#5B9BD5'
    # 渠道颜色
    腾讯: '#1F4E79'
    抖音: '#ED7D31'
    精准营销: '#FFC000'
    付费商店: '#70AD47'
    其他信息流: '#9DC3E6'
    其他CPA渠道: '#FF8080'
    MGM: '#404040'
    # CPS指标颜色
    1-7全首借CPS: '#4472C4'
    1-7 T0CPS: '#ED7D31'
    # 质量指标颜色
    1-7 T0平均授信额度: '#FFC000'
    1-3 T0过件率: '#4472C4'
    1-3 T0过件率_投放渠道: '#ED7D31'
    1-3 T0过件率_免费: '#70AD47'
    # 新增：渠道转化指标颜色
    日耗: '#4472C4'
    T0CPS_24h: '#ED7D31'
    1-7平均额度: '#FFC000'
    进件1-3通过率: '#70AD47'
    进件1-7通过率: '#9DC3E6'
    # 新增：请求/竞得/转化指标颜色
    请求数: '#808080'
    参竞数: '#4472C4'
    竞得数: '#4472C4'
    参竞率: '#ED7D31'
    竞得率: '#ED7D31'
    整体竞得率: '#000000'
    1Q竞得率: '#4472C4'
    2Q竞得率: '#ED7D31'
    3Q竞得率: '#FFC000'
    UNK竞得率: '#808080'
    其他竞得率: '#70AD47'
    # 新增：曝光转化指标
    曝光数: '#808080'
    点击数: '#4472C4'
    登录数: '#ED7D31'
    授信数: '#FFC000'
    CTR: '#4472C4'
    CVR: '#ED7D31'
    # 新增：精准授库/转化指标
    日均撞库量（亿）: '#4472C4'
    日均可营销量（亿）: '#ED7D31'
    可营销率: '#808080'
    千次可营销-授信率: '#4472C4'
    千次可营销-首登率: '#4472C4'
    首登-授信率: '#ED7D31'

  global:
    title_color: '#8B4513'
    total_line_color: '#FF0000'
    label_color: '#5A5A5A'
    font_family: STKaiti
