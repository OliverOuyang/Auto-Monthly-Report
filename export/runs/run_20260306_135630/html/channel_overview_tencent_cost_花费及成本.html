<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花费及成本</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','SimHei',sans-serif; background:#fff; }
.page { max-width:1200px; margin:0 auto; padding:40px 50px; }
.title { font-size:22px; font-weight:bold; color:#8B4513; }
.line { height:3px; background:linear-gradient(to right,#DAA520,#F0E68C); margin:6px 0 18px; }
.summary { font-size:15px; color:#333; line-height:1.9; margin-bottom:10px; }
#chart { width:100%; height:500px; }
.bar { height:6px; background:linear-gradient(to right,#C0392B,#F5B7B1,#FADBD8); margin-top:25px; border-radius:2px; }
</style>
</head>
<body>
<div class="page">
  <div class="title">腾讯总览：质量成本达成良好;稳定质量,持续提升用户质量</div>
  <div class="line"></div>
  <div class="summary">腾讯总览: 质量成本达成良好;稳定质量,持续提升用户质量<br/>数据表现: 成本由24.3%下降至18.8%,日耗下降14万<br/>未来方向: 稳定质量,花费达标(50万日耗)下,通过扣回传、RTA尾部降价方式持续提升用户质量</div>
  <div id="chart"></div>
  <div class="bar"></div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  title:{ text:'花费及成本', left:'center', top:0,
           textStyle:{ fontSize:15, fontWeight:'bold', color:'#333' } },
  tooltip:{ trigger:'axis', axisPointer:{ type:'shadow' } },
  legend:{ bottom:0, data:["日耗", "T0CPS_24h"],
            itemWidth:14, itemHeight:10, textStyle:{ fontSize:11 } },
  grid:{ left:'3%', right:'3%', top:45, bottom:45, containLabel:true },
  xAxis:{ type:'category', data:["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26"],
           axisLabel:{ fontSize:11, color:'#555' } },
  yAxis:[
    { type:'value', name:'日耗',
       axisLabel:{ fontSize:10, color:'#555' },
       splitLine:{ show:true, lineStyle:{ color:'#EEEEEE' } } },
    { type:'value', name:'过件率',
       axisLabel:{ formatter:'{value}%', fontSize:10, color:'#555' },
       splitLine:{ show:false } }
  ],
  series: [{"name": "日耗", "type": "bar", "data": [107.06, 107.38, 89.09, 111.7, 140.83, 157.78, 118.46, 124.42, 126.6, 62.28, 78.45, 64.88, 53.45, 39.71], "barWidth": "40%", "itemStyle": {"color": "#4472C4"}, "yAxisIndex": 0, "label": {"show": true, "position": "inside", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}"}}, {"name": "T0CPS_24h", "type": "line", "data": [30.9, 39.6, 35.9, 35.3, 33.8, 30.6, 28.4, 27.9, 29.1, 22.7, 27.7, 26.7, 24.3, 18.8], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#ED7D31", "width": 2.5}, "itemStyle": {"color": "#ED7D31"}, "yAxisIndex": 1, "label": {"show": true, "position": "top", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}%"}}]
});
window.addEventListener('resize', function(){ chart.resize(); });
</script>
</body>
</html>
