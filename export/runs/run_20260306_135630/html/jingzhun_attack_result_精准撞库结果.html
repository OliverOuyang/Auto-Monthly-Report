<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>精准撞库结果</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','SimHei',sans-serif; background:#fff; }
.page { max-width:1200px; margin:0 auto; padding:40px 50px; }
.title { font-size:22px; font-weight:bold; color:#8B4513; }
.line { height:3px; background:linear-gradient(to right,#DAA520,#F0E68C); margin:6px 0 18px; }
.summary { font-size:15px; color:#333; line-height:1.9; margin-bottom:10px; }
#chart { width:100%; height:500px; }
.bar { height:6px; background:linear-gradient(to right,#C0392B,#F5B7B1,#FADBD8); margin-top:25px; border-radius:2px; }
</style>
</head>
<body>
<div class="page">
  <div class="title">精准转化-撞库至可营销</div>
  <div class="line"></div>
  <div class="summary">2月数据表现:<br/>- 日均撞库量（亿）: 7.67 (环比下降2.64)<br/>- 日均可营销量（亿）: 2.14 (环比上升0.68)<br/>- 可营销率: 27.89% (环比上升13.74pp)</div>
  <div id="chart"></div>
  <div class="bar"></div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  title:{ text:'精准撞库结果', left:'center', top:0,
           textStyle:{ fontSize:15, fontWeight:'bold', color:'#333' } },
  tooltip:{ trigger:'axis', axisPointer:{ type:'shadow' } },
  legend:{ bottom:0, data:["日均撞库量（亿）", "日均可营销量（亿）", "可营销率"],
            itemWidth:14, itemHeight:10, textStyle:{ fontSize:11 } },
  grid:{ left:'3%', right:'3%', top:45, bottom:45, containLabel:true },
  xAxis:{ type:'category', data:["Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26"],
           axisLabel:{ fontSize:11, color:'#555' } },
  yAxis:[
    { type:'value', name:'数量',
       axisLabel:{ fontSize:10, color:'#555' },
       splitLine:{ show:true, lineStyle:{ color:'#EEEEEE' } } },
    { type:'value', name:'率',
       axisLabel:{ formatter:'{value}%', fontSize:10, color:'#555' },
       splitLine:{ show:false } }
  ],
  series: [{"name": "日均撞库量（亿）", "type": "bar", "data": [9.0, 9.1, 10.7, 10.4, 10.7, 10.2, 10.3, 7.7], "itemStyle": {"color": "#4472C4"}, "label": {"show": true, "position": "top", "fontSize": 10, "color": "#555", "fontWeight": "bold"}}, {"name": "日均可营销量（亿）", "type": "bar", "data": [3.5, 3.7, 4.1, 3.5, 3.1, 2.0, 1.5, 2.1], "itemStyle": {"color": "#ED7D31"}, "label": {"show": true, "position": "top", "fontSize": 10, "color": "#555", "fontWeight": "bold"}}, {"name": "可营销率", "type": "line", "yAxisIndex": 1, "data": [39.2, 40.3, 38.0, 34.0, 29.5, 19.7, 14.1, 27.9], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#2E8B57", "width": 2.5}, "itemStyle": {"color": "#2E8B57"}, "label": {"show": true, "position": "top", "fontSize": 10, "color": "#2E8B57", "fontWeight": "bold", "formatter": "{c}%"}}]
});
window.addEventListener('resize', function(){ chart.resize(); });
</script>
</body>
</html>
