<!DOCTYPE html>

<head>

<style>

.page { max-width:1200px; margin:0 auto; padding:40px 50px; }
.title { font-size:22px; font-weight:bold; color:#8B4513; }

           axisLabel:{ formatter:'{value}%', fontSize:10, color:'#555' },

  series: [{"name": "1Q竞得率", "type": "line", "data": [0.1, 0.1, 0.1, 0.2], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#4472C4", "width": 2.5}, "itemStyle": {"color": "#4472C4"}, "label": {"show": true, "position": "top", "fontSize": 10, "color": "#4472C4", "fontWeight": "bold", "formatter": "{c}%"}}, {"name": "2Q竞得率", "type": "line", "data": [0.3, 0.3, 0.3, 0.3], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#ED7D31", "width": 2.5}, "itemStyle": {"color": "#ED7D31"}, "label": {"show": true, "position": "top", "fontSize": 10, "color": "#ED7D31", "fontWeight": "bold", "formatter": "{c}%"}}, {"name": "3Q竞得率", "type": "line", "data": [0.4, 0.3, 0.4, 0.4], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#FFC000", "width": 2.5}, "itemStyle": {"color": "#FFC000"}, "label": {"show": true, "position": "top", "fontSize": 10, "color": "#FFC000", "fontWeight": "bold", "formatter": "{c}%"}}, {"name": "UNK竞得率", "type": "line", "data": [0.2, 0.1, 0.1, 0.1], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#808080", "width": 2.5}, "itemStyle": {"color": "#808080"}, "label": {"show": true, "position": "top", "fontSize": 10, "color": "#808080", "fontWeight": "bold", "formatter": "{c}%"}}]
