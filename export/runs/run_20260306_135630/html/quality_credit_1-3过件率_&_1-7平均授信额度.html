<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1-3过件率 & 1-7平均授信额度</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','SimHei',sans-serif; background:#fff; }
.page { max-width:1200px; margin:0 auto; padding:40px 50px; }
.title { font-size:22px; font-weight:bold; color:#8B4513; }
.line { height:3px; background:linear-gradient(to right,#DAA520,#F0E68C); margin:6px 0 18px; }
.summary { font-size:15px; color:#333; line-height:1.9; margin-bottom:10px; }
#chart { width:100%; height:500px; }
.bar { height:6px; background:linear-gradient(to right,#C0392B,#F5B7B1,#FADBD8); margin-top:25px; border-radius:2px; }
</style>
</head>
<body>
<div class="page">
  <div class="title">获客质量指标：首登T0 1-3组过件率、1-7组平均授信额度</div>
  <div class="line"></div>
  <div class="summary">2月1-7 T0平均授信额度22859元，环比1月上升1391元。<br/>1-3 T0过件率7.41%，环比下降0.50个百分点；<br/>投放渠道过件率16.34%（环比0.28pp），免费渠道1.91%（环比0.25pp）。</div>
  <div id="chart"></div>
  <div class="bar"></div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  title:{ text:'1-3过件率 & 1-7平均授信额度', left:'center', top:0,
           textStyle:{ fontSize:15, fontWeight:'bold', color:'#333' } },
  tooltip:{ trigger:'axis', axisPointer:{ type:'shadow' } },
  legend:{ bottom:0, data:["1-7 T0平均授信额度", "1-3 T0过件率", "1-3 T0过件率_投放渠道", "1-3 T0过件率_免费"],
            itemWidth:14, itemHeight:10, textStyle:{ fontSize:11 } },
  grid:{ left:'3%', right:'3%', top:45, bottom:45, containLabel:true },
  xAxis:{ type:'category', data:["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26"],
           axisLabel:{ fontSize:11, color:'#555' } },
  yAxis:[
    { type:'value', name:'1-7 T0平均授信额度',
       axisLabel:{ fontSize:10, color:'#555' },
       splitLine:{ show:true, lineStyle:{ color:'#EEEEEE' } } },
    { type:'value', name:'过件率',
       axisLabel:{ formatter:'{value}%', fontSize:10, color:'#555' },
       splitLine:{ show:false } }
  ],
  series: [{"name": "1-7 T0平均授信额度", "type": "bar", "data": [22559.01, 23472.16, 25422.23, 25910.23, 25004.0, 25388.04, 26537.66, 27251.77, 27566.29, 26150.84, 23456.22, 20972.23, 21468.06, 22859.18], "barWidth": "40%", "itemStyle": {"color": "#FFC000"}, "yAxisIndex": 0, "label": {"show": true, "position": "inside", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}"}}, {"name": "1-3 T0过件率", "type": "line", "data": [9.7, 9.5, 8.9, 9.6, 9.6, 10.0, 9.8, 10.8, 10.7, 8.6, 8.7, 7.6, 7.9, 7.4], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#4472C4", "width": 2.5}, "itemStyle": {"color": "#4472C4"}, "yAxisIndex": 1, "label": {"show": true, "position": "top", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}%"}}, {"name": "1-3 T0过件率_投放渠道", "type": "line", "data": [13.7, 13.5, 12.9, 13.1, 12.3, 12.4, 13.2, 14.4, 14.5, 12.5, 13.2, 13.7, 16.1, 16.3], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#ED7D31", "width": 2.5}, "itemStyle": {"color": "#ED7D31"}, "yAxisIndex": 1, "label": {"show": true, "position": "top", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}%"}}, {"name": "1-3 T0过件率_免费", "type": "line", "data": [3.8, 3.5, 3.3, 3.4, 3.5, 3.7, 2.9, 3.3, 3.6, 2.9, 3.0, 2.4, 2.2, 1.9], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#70AD47", "width": 2.5}, "itemStyle": {"color": "#70AD47"}, "yAxisIndex": 1, "label": {"show": true, "position": "top", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}%"}}]
});
window.addEventListener('resize', function(){ chart.resize(); });
</script>
</body>
</html>
