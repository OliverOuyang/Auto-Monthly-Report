<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音-请求及参竞</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','SimHei',sans-serif; background:#fff; }
.page { max-width:1200px; margin:0 auto; padding:40px 50px; }
.title { font-size:22px; font-weight:bold; color:#8B4513; }
.line { height:3px; background:linear-gradient(to right,#DAA520,#F0E68C); margin:6px 0 18px; }
.summary { font-size:15px; color:#333; line-height:1.9; margin-bottom:10px; }
#chart { width:100%; height:500px; }
.bar { height:6px; background:linear-gradient(to right,#C0392B,#F5B7B1,#FADBD8); margin-top:25px; border-radius:2px; }
</style>
</head>
<body>
<div class="page">
  <div class="title">抖音转化—请求及参竞</div>
  <div class="line"></div>
  <div class="summary">2月日请求量47.4亿,环比1月下降6.5亿(变化12.1%)<br/>参竞率60.4%,环比下降3.2个百分点<br/>近3个月请求量持续下降</div>
  <div id="chart"></div>
  <div class="bar"></div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  title:{ text:'抖音-请求及参竞', left:'center', top:0,
           textStyle:{ fontSize:15, fontWeight:'bold', color:'#333' } },
  tooltip:{ trigger:'axis', axisPointer:{ type:'shadow' } },
  legend:{ bottom:0, data:["日请求量", "参竞率"],
            itemWidth:14, itemHeight:10, textStyle:{ fontSize:11 } },
  grid:{ left:'3%', right:'3%', top:45, bottom:45, containLabel:true },
  xAxis:{ type:'category', data:["Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26"],
           axisLabel:{ fontSize:11, color:'#555' } },
  yAxis:[
    { type:'value', name:'日请求量',
       axisLabel:{ fontSize:10, color:'#555' },
       splitLine:{ show:true, lineStyle:{ color:'#EEEEEE' } } },
    { type:'value', name:'过件率',
       axisLabel:{ formatter:'{value}%', fontSize:10, color:'#555' },
       splitLine:{ show:false } }
  ],
  series: [{"name": "日请求量", "type": "bar", "data": [73.8, 69.91, 61.54, 53.94, 47.42], "barWidth": "40%", "itemStyle": {"color": "#FFC000"}, "yAxisIndex": 0, "label": {"show": true, "position": "inside", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}"}}, {"name": "参竞率", "type": "line", "data": [83.3, 75.9, 63.9, 63.6, 60.4], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#ED7D31", "width": 2.5}, "itemStyle": {"color": "#ED7D31"}, "yAxisIndex": 1, "label": {"show": true, "position": "top", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}%"}, "markLine": {"silent": false, "symbol": ["none", "arrow"], "data": [{"xAxis": 2, "label": {"formatter": "1125 RTAV8迭代 多排除7%交易", "position": "end", "fontSize": 10, "color": "#D73027", "fontWeight": "bold"}, "lineStyle": {"color": "#D73027", "type": "dashed", "width": 2}}]}}]
});
window.addEventListener('resize', function(){ chart.resize(); });
</script>
</body>
</html>
