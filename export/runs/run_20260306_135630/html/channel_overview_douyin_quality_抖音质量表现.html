<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抖音质量表现</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Microsoft YaHei','SimHei',sans-serif; background:#fff; }
.page { max-width:1200px; margin:0 auto; padding:40px 50px; }
.title { font-size:22px; font-weight:bold; color:#8B4513; }
.line { height:3px; background:linear-gradient(to right,#DAA520,#F0E68C); margin:6px 0 18px; }
.summary { font-size:15px; color:#333; line-height:1.9; margin-bottom:10px; }
#chart { width:100%; height:500px; }
.bar { height:6px; background:linear-gradient(to right,#C0392B,#F5B7B1,#FADBD8); margin-top:25px; border-radius:2px; }
</style>
</head>
<body>
<div class="page">
  <div class="title">抖音总览：规模不足、指标波动较大;短期适当放开排除、提出价方式提升规模</div>
  <div class="line"></div>
  <div class="summary">质量指标: 1-7额度25440元(环比下降580元),1-3过件率16.5%(环比下降2.1pp),1-7过件率53.3%(环比下降3.9pp)<br/>趋势观察: 近3个月额度呈下降趋势,从26291元降至25440元</div>
  <div id="chart"></div>
  <div class="bar"></div>
</div>
<script>
var chart = echarts.init(document.getElementById('chart'));
chart.setOption({
  title:{ text:'抖音质量表现', left:'center', top:0,
           textStyle:{ fontSize:15, fontWeight:'bold', color:'#333' } },
  tooltip:{ trigger:'axis', axisPointer:{ type:'shadow' } },
  legend:{ bottom:0, data:["1-7额度", "过件率1-3_排年龄", "过件率1-7_排年龄"],
            itemWidth:14, itemHeight:10, textStyle:{ fontSize:11 } },
  grid:{ left:'3%', right:'3%', top:45, bottom:45, containLabel:true },
  xAxis:{ type:'category', data:["Jan-25", "Feb-25", "Mar-25", "Apr-25", "May-25", "Jun-25", "Jul-25", "Aug-25", "Sep-25", "Oct-25", "Nov-25", "Dec-25", "Jan-26", "Feb-26"],
           axisLabel:{ fontSize:11, color:'#555' } },
  yAxis:[
    { type:'value', name:'1-7额度',
       axisLabel:{ fontSize:10, color:'#555' },
       splitLine:{ show:true, lineStyle:{ color:'#EEEEEE' } } },
    { type:'value', name:'过件率',
       axisLabel:{ formatter:'{value}%', fontSize:10, color:'#555' },
       splitLine:{ show:false } }
  ],
  series: [{"name": "1-7额度", "type": "bar", "data": [25891.61, 26699.32, 29998.29, 30700.77, 29780.06, 28007.73, 29360.34, 30347.07, 31619.42, 31523.94, 28734.94, 26291.07, 26020.46, 25440.04], "barWidth": "40%", "itemStyle": {"color": "#FFC000"}, "yAxisIndex": 0, "label": {"show": true, "position": "inside", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}"}}, {"name": "过件率1-3_排年龄", "type": "line", "data": [19.1, 20.1, 20.0, 20.4, 20.1, 18.6, 19.7, 20.8, 22.0, 19.7, 19.8, 18.8, 18.6, 16.5], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#4472C4", "width": 2.5}, "itemStyle": {"color": "#4472C4"}, "yAxisIndex": 1, "label": {"show": true, "position": "top", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}%"}}, {"name": "过件率1-7_排年龄", "type": "line", "data": [51.6, 54.8, 53.3, 54.6, 56.1, 55.8, 56.4, 56.5, 56.9, 54.5, 54.7, 55.5, 57.2, 53.3], "symbol": "circle", "symbolSize": 5, "lineStyle": {"color": "#4472C4", "width": 2.5}, "itemStyle": {"color": "#4472C4"}, "yAxisIndex": 1, "label": {"show": true, "position": "top", "fontSize": 9, "fontWeight": "bold", "formatter": "{c}%"}}]
});
window.addEventListener('resize', function(){ chart.resize(); });
</script>
</body>
</html>
